<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" sizes="48x48" href="favicon.png" />
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Krishna Ramos Jain, Pipeline Developer &amp; Animator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream:        #ede1c5;
    --cream-2:      #f4ebd2;
    --ink:          #1a1310;
    --ink-soft:     #2a1f15;
    --muted:        #6b5c52;
    --cobalt:       #3f5d8a;
    --cobalt-lt:    #c7d3e8;
    --cobalt-deep:  #2a4570;
    --tan:          #c4854a;
    --tan-lt:       #f0d8b8;
    --brown:        #7a4520;
    --magenta:      #c63ca8;
    --magenta-lt:   #fae3f2;
    /* Always-light text. Use on fixed-color chips/bars that don't flip with theme. */
    --on-color:     #f4ebd2;
    --font-d:       'Alfa Slab One', serif;
    --font-b:       'DM Sans', system-ui, sans-serif;
  }
  [data-theme="dark"] {
    --cream:        #1a1815;
    --cream-2:      #251f1a;
    --ink:          #f0e6cf;
    --ink-soft:     #d8c8a8;
    --muted:        #9e8e7a;
    --cobalt-lt:    #1e2e4a;
    --tan-lt:       #2a1f15;
    --magenta-lt:   #2a1530;
    /* --on-color stays the same in dark mode (it's for colored bg chips) */
  }
  html { scroll-behavior: smooth; }
  body { background: var(--cream); color: var(--ink); font-family: var(--font-b); font-size: 16px; line-height: 1.6; overflow-x: hidden; }
  a { color: inherit; }

  /* ─── BANNER + NAV ──────────────────────────────────────────── */
  .marquee {
    position: sticky; top: 0; z-index: 100;
    background: var(--cobalt); color: var(--on-color);
    border-bottom: 3px solid var(--ink);
    box-shadow: 0 3px 0 var(--ink);
  }
  .marquee-top {
    padding: 10px 32px; display: flex; justify-content: space-between; align-items: center;
    font-family: var(--font-d); font-size: 15px; letter-spacing: 0.04em;
  }
  .marquee-top .r {
    font-family: var(--font-b); font-weight: 700; font-size: 10.5px;
    letter-spacing: 0.22em; text-transform: uppercase; opacity: 0.9;
    display: flex; align-items: center; gap: 14px;
  }
  .theme-toggle {
    background: var(--cream-2); color: var(--ink); border: 2px solid var(--ink);
    box-shadow: 3px 3px 0 var(--ink);
    padding: 4px 12px; font-family: var(--font-d); font-size: 11px;
    letter-spacing: 0.1em; cursor: pointer; transition: transform 0.1s;
  }
  .theme-toggle:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--ink); }
  .theme-toggle:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--ink); }
  .marquee-nav {
    background: var(--ink); color: var(--cream-2);
    padding: 10px 16px; display: flex; gap: 4px; justify-content: center; align-items: center;
    font-family: var(--font-d); font-size: 13px; letter-spacing: 0.08em;
    flex-wrap: wrap;
  }
  .marquee-nav a {
    color: var(--cream-2); text-decoration: none; padding: 2px 12px;
    transition: color 0.12s;
  }
  .marquee-nav a:hover { color: var(--tan); }
  .marquee-nav .star { color: var(--tan); font-size: 11px; }

  /* ─── COMMON: PLAQUE, CARD, CHIP, BG SHADOW ─────────────────── */
  .wrap { max-width: 1280px; margin: 0 auto; padding: 80px 48px; }
  .section { position: relative; }
  .section.cobalt-wash { background: var(--cobalt-lt); }
  .section.tan-wash    { background: var(--tan-lt); }
  .section.magenta-wash{ background: var(--magenta-lt); }

  .plaque {
    display: inline-block;
    font-family: var(--font-d); font-size: 18px; letter-spacing: 0.04em;
    padding: 8px 22px;
    background: var(--cream-2); color: var(--ink);
    border: 3px solid var(--ink); box-shadow: 6px 6px 0 var(--ink);
    transform: rotate(-1.2deg);
    margin-bottom: 36px;
  }
  .plaque.cobalt   { background: var(--cobalt);       color: var(--cream-2); transform: rotate(-1.5deg); }
  .plaque.brown    { background: var(--brown);        color: var(--cream-2); transform: rotate(1.5deg); }
  .plaque.tan      { background: var(--tan);          color: var(--ink);     transform: rotate(-1deg); }
  .plaque.magenta  { background: var(--magenta);      color: var(--cream-2); transform: rotate(1.2deg); }
  .plaque.deep     { background: var(--cobalt-deep);  color: var(--cream-2); transform: rotate(-1deg); }

  .plaque .n {
    display: inline-block; background: var(--cream-2); color: var(--ink);
    font-size: 12px; padding: 1px 7px; border: 2px solid var(--ink);
    margin-right: 10px; vertical-align: middle; position: relative; top: -2px;
  }
  .plaque.cobalt .n, .plaque.brown .n, .plaque.magenta .n, .plaque.deep .n { background: var(--cream-2); color: var(--ink); }

  .card {
    background: var(--cream-2); color: var(--ink);
    border: 3px solid var(--ink); box-shadow: 7px 7px 0 var(--ink);
    padding: 28px 32px;
  }
  .card.tilt-l { transform: rotate(-0.6deg); }
  .card.tilt-r { transform: rotate(0.6deg); }

  .chip {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--cream-2); color: var(--ink);
    border: 2.5px solid var(--ink); box-shadow: 4px 4px 0 var(--ink);
    font-family: var(--font-d); font-size: 12px; letter-spacing: 0.06em;
    padding: 7px 14px; text-decoration: none;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .chip:hover { transform: translate(-1px, -1px); box-shadow: 5px 5px 0 var(--ink); }
  .chip:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--ink); }
  .chip svg { width: 13px; height: 13px; flex-shrink: 0; }
  .chip.cobalt  { background: var(--cobalt);  color: var(--on-color); }
  .chip.brown   { background: var(--brown);   color: var(--on-color); }
  .chip.magenta { background: var(--magenta); color: var(--on-color); }
  .chip.tan     { background: var(--tan);     color: var(--ink); }

  /* ─── HERO ──────────────────────────────────────────────────── */
  .tc-bg-burst {
    position: absolute; inset: 0; pointer-events: none; z-index: 0;
    background: repeating-conic-gradient(from -8deg at 78% 42%, var(--cream) 0deg 22deg, oklch(from var(--cream) calc(l - 0.04) c h) 22deg 44deg);
    opacity: 0.55;
  }
  .hero { position: relative; z-index: 1; padding: 64px 48px 56px; max-width: 1280px; margin: 0 auto; }
  .hero-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 36px; align-items: center; }
  .presenting {
    font-family: var(--font-d); font-size: 22px; letter-spacing: 0.02em; color: var(--ink);
    background: var(--cream-2); padding: 4px 18px;
    border: 2.5px solid var(--ink); box-shadow: 5px 5px 0 var(--ink);
    transform: rotate(-2deg); display: inline-block;
  }
  .hero-name {
    font-family: var(--font-d); font-size: clamp(72px, 7.5vw, 116px);
    line-height: 0.88; color: var(--ink); letter-spacing: -0.02em;
    margin: 18px 0 14px;
    text-shadow: 5px 5px 0 var(--cream-2), 5px 5px 0 var(--ink);
  }
  .hero-name span { color: var(--cobalt); }
  .hero-role {
    font-family: var(--font-d); font-size: 22px; color: var(--cream-2);
    background: var(--ink); display: inline-block;
    padding: 7px 18px; border: 2.5px solid var(--ink);
    box-shadow: 5px 5px 0 var(--cobalt); transform: rotate(1deg);
    margin-bottom: 22px;
  }
  .hero-desc {
    font-family: var(--font-b); font-size: 16px; font-weight: 500;
    line-height: 1.65; color: var(--ink-soft); max-width: 48ch;
    margin-bottom: 24px;
  }
  .hero-desc b {
    font-weight: 700;
    background: linear-gradient(transparent 62%, var(--tan) 62%, var(--tan) 92%, transparent 92%);
    padding: 0 2px;
  }
  .hero-ctas { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 22px; }
  .btn-big {
    font-family: var(--font-d); font-size: 15px; letter-spacing: 0.04em;
    padding: 10px 20px; text-decoration: none;
    border: 3px solid var(--ink); box-shadow: 5px 5px 0 var(--ink);
    transition: transform 0.1s, box-shadow 0.1s; cursor: pointer;
  }
  .btn-big:hover { transform: translate(-1px, -1px); box-shadow: 6px 6px 0 var(--ink); }
  .btn-big:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--ink); }
  .btn-big.cobalt  { background: var(--cobalt);  color: var(--on-color); }
  .btn-big.tan     { background: var(--tan);     color: var(--ink); }
  .btn-big.cream   { background: var(--cream-2); color: var(--ink); }
  .hero-socials { display: flex; gap: 10px; flex-wrap: wrap; }

  .portrait-wrap { position: relative; display: flex; align-items: center; justify-content: center; min-height: 460px; perspective: 1200px; }
  .portrait-hex {
    position: absolute; width: 92%; max-width: 460px; aspect-ratio: 1.05 / 1;
    transform: translate(14px, 28px) rotateX(58deg) rotate(8deg);
    transform-origin: 50% 50%;
    z-index: 1;
  }
  .portrait-hex svg { width: 100%; height: 100%; }
  .portrait {
    position: relative; width: 100%; max-width: 460px; z-index: 2;
  }
  .portrait img { width: 100%; height: auto; display: block; }

  .stats-strip {
    background: var(--ink); color: var(--cream-2);
    display: flex; justify-content: space-around; padding: 18px 24px;
    font-family: var(--font-d); border-top: 3px solid var(--ink);
    flex-wrap: wrap; gap: 20px;
  }
  .stat { text-align: center; }
  .stat .n { font-size: 38px; color: var(--tan); line-height: 1; }
  .stat .l { font-family: var(--font-b); font-size: 10.5px; font-weight: 700;
             letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.8; margin-top: 4px; }

  /* ─── REEL ──────────────────────────────────────────────────── */
  .reel-frame {
    background: var(--ink); padding: 22px;
    border: 3px solid var(--ink); box-shadow: 10px 10px 0 var(--cobalt-deep);
    max-width: 900px; margin: 0 auto;
  }
  .reel-frame .marquee-strip {
    background: var(--cream-2); color: var(--ink); padding: 8px 18px;
    font-family: var(--font-d); font-size: 14px; letter-spacing: 0.08em;
    border: 2.5px solid var(--cream-2); margin-bottom: 16px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .reel-frame .marquee-strip .bulb {
    display: inline-block; width: 9px; height: 9px; border-radius: 50%;
    background: var(--tan); box-shadow: 0 0 8px var(--tan);
    margin-right: 6px;
  }
  .reel-thumb {
    position: relative; background: #000; aspect-ratio: 16/9;
    cursor: pointer; overflow: hidden;
  }
  .reel-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity 0.2s; }
  .reel-thumb:hover img { opacity: 0.85; }
  .reel-play {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 86px; height: 86px; background: var(--cream-2);
    border: 4px solid var(--ink); box-shadow: 5px 5px 0 var(--ink);
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .reel-play::after {
    content: ''; width: 0; height: 0;
    border-style: solid; border-width: 14px 0 14px 24px;
    border-color: transparent transparent transparent var(--cobalt);
    margin-left: 4px;
  }
  .reel-caption {
    margin-top: 18px; font-family: var(--font-b); font-size: 13px;
    color: var(--cream-2); text-align: center; opacity: 0.85; letter-spacing: 0.06em;
  }

  /* ─── CREDITS ───────────────────────────────────────────────── */
  .employer-stack { display: flex; flex-direction: column; gap: 18px; }
  .employer-card {
    background: var(--cream-2); border: 3px solid var(--ink);
    box-shadow: 7px 7px 0 var(--ink);
  }
  .employer-head {
    background: var(--cobalt); color: var(--on-color);
    padding: 16px 28px; border-bottom: 3px solid var(--ink);
    display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
  }
  .employer-head .studio { font-family: var(--font-d); font-size: 22px; letter-spacing: -0.01em; }
  .employer-head .role { font-family: var(--font-b); font-size: 13px; font-weight: 700;
                         letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.92; }
  .employer-head .tenure { margin-left: auto; font-family: var(--font-b);
                           font-size: 12px; font-weight: 700; letter-spacing: 0.1em; opacity: 0.85; }
  .employer-body { display: flex; flex-wrap: wrap; }
  .project {
    padding: 16px 24px; border-right: 2px solid var(--ink);
    flex: 1 1 220px; min-width: 200px;
  }
  .project:last-child { border-right: none; }
  .project .client { font-family: var(--font-d); font-size: 10px; letter-spacing: 0.16em;
                     color: var(--magenta); margin-bottom: 4px; }
  .project .title  { font-family: var(--font-d); font-size: 16px; color: var(--ink); }

  /* ─── PIPELINE ──────────────────────────────────────────────── */
  .pipeline-intro {
    max-width: 640px; font-family: var(--font-b); font-size: 16px;
    line-height: 1.7; color: var(--ink-soft); margin-bottom: 36px;
  }
  .pipeline-intro b { color: var(--ink); font-weight: 700;
                      background: linear-gradient(transparent 62%, var(--tan) 62%, var(--tan) 92%, transparent 92%);
                      padding: 0 2px; }
  .pipeline-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px; }
  .pipeline-card {
    background: var(--cream-2); border: 3px solid var(--ink);
    box-shadow: 6px 6px 0 var(--ink); padding: 24px 26px;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .pipeline-card:hover { transform: translate(-1px, -1px); box-shadow: 7px 7px 0 var(--ink); }
  .pipeline-card .top { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 14px; }
  .p-tag {
    font-family: var(--font-d); font-size: 11px; letter-spacing: 0.08em;
    color: var(--on-color); background: var(--cobalt-deep);
    padding: 3px 9px; border: 2px solid var(--ink);
  }
  .p-self {
    font-family: var(--font-d); font-size: 10px; letter-spacing: 0.08em;
    color: var(--on-color); background: var(--magenta);
    padding: 3px 8px; border: 2px solid var(--ink); white-space: nowrap;
  }
  .pipeline-card h3 { font-family: var(--font-d); font-size: 19px; margin-bottom: 10px; line-height: 1.15; }
  .pipeline-card p { font-family: var(--font-b); font-size: 14px; line-height: 1.65;
                     color: var(--ink-soft); margin-bottom: 16px; }
  .p-tools { display: flex; flex-wrap: wrap; gap: 5px; }
  .tool-chip {
    font-family: var(--font-b); font-size: 11px; font-weight: 600;
    padding: 3px 9px; border: 2px solid var(--ink);
    background: var(--cream); color: var(--ink);
  }

  /* ─── SKILLS ────────────────────────────────────────────────── */
  .skills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 28px; }
  .skill-block {
    background: var(--cream-2); border: 3px solid var(--ink);
    box-shadow: 6px 6px 0 var(--ink); padding: 22px 24px;
  }
  .skill-block h4 {
    font-family: var(--font-d); font-size: 12px; letter-spacing: 0.12em;
    color: var(--on-color); background: var(--brown);
    padding: 5px 12px; margin: -22px -24px 16px;
    border-bottom: 3px solid var(--ink);
  }
  .skill-block ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .skill-block li { font-family: var(--font-b); font-size: 14px; color: var(--ink-soft);
                    display: flex; align-items: center; gap: 9px; }
  .skill-block li::before {
    content: ''; width: 9px; height: 9px; background: var(--cream);
    border: 2px solid var(--ink); flex-shrink: 0;
  }
  .skill-block li.primary { color: var(--ink); font-weight: 600; }
  .skill-block li.primary::before { background: var(--tan); }

  /* ─── ART GALLERY ───────────────────────────────────────────── */
  .gallery-grid { columns: 3; column-gap: 16px; }
  .gal-item {
    break-inside: avoid; margin-bottom: 16px;
    background: var(--cream-2); border: 3px solid var(--ink);
    box-shadow: 6px 6px 0 var(--ink); overflow: hidden;
    cursor: zoom-in; position: relative;
    transition: transform 0.1s;
  }
  .gal-item:hover { transform: translate(-1px, -1px); }
  .gal-item img, .gal-item video { display: block; width: 100%; }
  .gal-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, oklch(0% 0 0 / 0.7));
    color: var(--on-color); padding: 22px 12px 10px;
    font-family: var(--font-d); font-size: 11px; letter-spacing: 0.04em;
    opacity: 0; transition: opacity 0.15s;
  }
  .gal-item:hover .gal-label { opacity: 1; }

  /* ─── DEVLOG ────────────────────────────────────────────────── */
  .devlog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px; }
  .devlog-card {
    background: var(--cream-2); border: 3px solid var(--ink);
    box-shadow: 6px 6px 0 var(--ink); overflow: hidden;
    cursor: pointer; transition: transform 0.1s, box-shadow 0.1s;
  }
  .devlog-card:hover { transform: translate(-1px, -1px); box-shadow: 7px 7px 0 var(--ink); }
  .devlog-media { width: 100%; display: block; aspect-ratio: 16/9;
                  object-fit: cover; background: var(--cream); border-bottom: 3px solid var(--ink); }
  .devlog-media-placeholder {
    aspect-ratio: 16/9; border-bottom: 3px solid var(--ink);
    background: repeating-linear-gradient(45deg, var(--cobalt-lt), var(--cobalt-lt) 12px, var(--cream) 12px, var(--cream) 24px);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-d); font-size: 12px; letter-spacing: 0.12em; color: var(--muted);
  }
  .devlog-body { padding: 18px 22px; }
  .devlog-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .devlog-tag {
    font-family: var(--font-d); font-size: 10px; letter-spacing: 0.1em;
    color: var(--on-color); background: var(--cobalt-deep);
    padding: 2px 8px; border: 2px solid var(--ink);
  }
  .devlog-date { font-family: var(--font-b); font-size: 11px; font-weight: 600;
                 color: var(--muted); margin-left: auto; letter-spacing: 0.05em; }
  .devlog-title { font-family: var(--font-d); font-size: 17px; margin-bottom: 8px; line-height: 1.25; }
  .devlog-desc { font-family: var(--font-b); font-size: 13px; line-height: 1.65; color: var(--ink-soft); }

  /* ─── ABOUT ─────────────────────────────────────────────────── */
  .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 56px; align-items: start; }
  .about-text p { font-family: var(--font-b); font-size: 15.5px; line-height: 1.8;
                  color: var(--ink-soft); margin-bottom: 18px; }
  .about-text p b { color: var(--ink); font-weight: 600; }
  .about-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .about-stat {
    background: var(--cream-2); border: 3px solid var(--ink);
    box-shadow: 5px 5px 0 var(--ink); padding: 22px; text-align: center;
  }
  .about-stat .n {
    font-family: var(--font-d); font-size: 48px; color: var(--cobalt); line-height: 1;
    text-shadow: 3px 3px 0 var(--cream);
  }
  .about-stat .l {
    font-family: var(--font-b); font-size: 12px; font-weight: 600;
    color: var(--ink-soft); margin-top: 6px; line-height: 1.4;
  }

  /* ─── FOOTER ────────────────────────────────────────────────── */
  footer {
    background: var(--ink); color: var(--cream-2);
    padding: 64px 48px 40px; position: relative;
  }
  .footer-inner { max-width: 1280px; margin: 0 auto; }
  .footer-end {
    font-family: var(--font-d); font-size: clamp(64px, 8vw, 124px);
    line-height: 0.95; color: var(--cream-2); text-align: center;
    margin-bottom: 36px; letter-spacing: -0.02em;
    text-shadow: 6px 6px 0 var(--cobalt);
  }
  .footer-top {
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 32px;
    padding-bottom: 28px; border-bottom: 2px dashed var(--muted); margin-bottom: 24px;
  }
  .footer-top h3 { font-family: var(--font-d); font-size: 24px; color: var(--cream-2); margin-bottom: 4px; }
  .footer-tagline { font-family: var(--font-b); font-size: 13px; color: var(--muted); }
  .footer-email a { font-family: var(--font-d); font-size: 22px; color: var(--tan); text-decoration: none; }
  .footer-email a:hover { color: var(--magenta); }
  .footer-bottom {
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
    font-family: var(--font-b); font-size: 11px; font-weight: 600;
    letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase;
  }
  .footer-socials { display: flex; gap: 10px; flex-wrap: wrap; }

  /* ─── RESPONSIVE ────────────────────────────────────────────── */
  @media (max-width: 820px) {
    .marquee-top { padding: 8px 16px; flex-direction: column; gap: 4px; align-items: center; text-align: center; font-size: 13px; }
    .marquee-top .r { font-size: 9.5px; gap: 10px; }
    .marquee-nav { padding: 8px 6px; gap: 1px; font-size: 11px; letter-spacing: 0.04em; }
    .marquee-nav a { padding: 2px 7px; }
    .marquee-nav .star { font-size: 9px; }

    .wrap { padding: 56px 22px; }
    .hero { padding: 40px 22px 32px; }
    .hero-grid { grid-template-columns: 1fr; gap: 24px; }
    .portrait-wrap { min-height: auto; max-width: 360px; margin: 12px auto 0; perspective: 900px; }
    .portrait-hex { transform: translate(10px, 22px) rotateX(58deg) rotate(8deg); }
    .hero-name { font-size: clamp(54px, 13vw, 80px); }
    .hero-role { font-size: 18px; padding: 6px 14px; }

    .stats-strip { padding: 14px 12px; gap: 12px; }
    .stat .n { font-size: 30px; }
    .stat .l { font-size: 9.5px; }

    .plaque { font-size: 15px; padding: 6px 16px; margin-bottom: 28px; }
    .plaque .n { font-size: 10px; padding: 1px 6px; margin-right: 7px; }

    .gallery-grid { columns: 2; column-gap: 12px; }
    .gal-item { margin-bottom: 12px; }

    .pipeline-grid, .devlog-grid { grid-template-columns: 1fr; gap: 14px; }

    .about-grid { grid-template-columns: 1fr; gap: 28px; }
    .about-stat .n { font-size: 38px; }

    .employer-head { padding: 14px 18px; gap: 6px 14px; }
    .employer-head .studio { font-size: 18px; }
    .employer-head .tenure { margin-left: 0; width: 100%; }
    .project { padding: 12px 18px; min-width: 0; flex-basis: 100%; border-right: none; border-bottom: 2px solid var(--ink); }
    .project:last-child { border-bottom: none; }

    .reel-frame { padding: 14px; }
    .reel-frame .marquee-strip { font-size: 11px; padding: 6px 12px; }

    footer { padding: 48px 22px 32px; }
    .footer-top { gap: 18px; }
    .footer-email a { font-size: 18px; }
  }

  @media (max-width: 460px) {
    .gallery-grid { columns: 1; }
    .hero-ctas { flex-direction: column; align-items: stretch; }
    .btn-big { text-align: center; }
    .about-stats { grid-template-columns: 1fr; }
  }

  /* ─── LIGHTBOX + MODAL ──────────────────────────────────────── */
  .lightbox {
    position: fixed; inset: 0; z-index: 999;
    background: oklch(0% 0 0 / 0.9);
    display: flex; align-items: center; justify-content: center; padding: 40px;
  }
  .lightbox img, .lightbox video {
    max-width: 90vw; max-height: 88vh; border: 4px solid var(--cream-2);
    box-shadow: 10px 10px 0 var(--cobalt); object-fit: contain;
  }
  .lightbox-close {
    position: fixed; top: 24px; right: 28px;
    background: var(--cream-2); color: var(--ink); border: 3px solid var(--ink);
    width: 42px; height: 42px; cursor: pointer; font-size: 22px;
    box-shadow: 4px 4px 0 var(--cobalt); font-family: var(--font-d);
  }
  .modal-overlay {
    position: fixed; inset: 0; z-index: 998;
    background: oklch(0% 0 0 / 0.78);
    display: flex; align-items: center; justify-content: center;
    padding: 40px 20px; overflow-y: auto;
  }
  .modal {
    background: var(--cream-2); border: 3px solid var(--ink);
    box-shadow: 10px 10px 0 var(--cobalt);
    max-width: 900px; width: 100%; max-height: 90vh; overflow-y: auto;
    position: relative; padding: 40px 44px;
  }
  .modal-close {
    position: absolute; top: 16px; right: 16px;
    background: var(--cream-2); border: 3px solid var(--ink);
    box-shadow: 4px 4px 0 var(--ink);
    width: 38px; height: 38px; font-family: var(--font-d); font-size: 18px;
    cursor: pointer; color: var(--ink);
  }
  .modal-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .modal h2 { font-family: var(--font-d); font-size: 30px; line-height: 1.15; margin-bottom: 14px; }
  .modal p { font-family: var(--font-b); font-size: 15px; line-height: 1.7;
             color: var(--ink-soft); margin-bottom: 22px; }
  .modal-gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
  .modal-gallery .gi {
    border: 3px solid var(--ink); box-shadow: 5px 5px 0 var(--cobalt);
    cursor: zoom-in; background: var(--cream);
  }
  .modal-gallery .gi img { display: block; width: 100%; }
  .modal-gallery .gi-cap { padding: 6px 10px; font-family: var(--font-b);
                           font-size: 11px; font-weight: 600; color: var(--muted);
                           border-top: 2px solid var(--ink); background: var(--cream); }
</style>
