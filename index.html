function IllustrationGallery() {
  const [lightbox, setLightbox] = React.useState(null);
  React.useEffect(() => {
    const handler = (e) => { if (e.key === 'Escape') setLightbox(null); };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);
  return (
    <>
      <div className="gallery-grid">
        {galleryItems.map((item, i) => (
          <div className="gal-item" key={i} onClick={() => setLightbox(item)}>
            <img src={item.src} alt={item.label} loading="lazy" />
            <div className="gal-label">{item.label}</div>
          </div>
        ))}
      </div>
      {lightbox && (
        <div className="lightbox-overlay" onClick={() => setLightbox(null)}>
          <button className="lightbox-close" onClick={() => setLightbox(null)}>×</button>
          <img src={lightbox.src} alt={lightbox.label} onClick={e => e.stopPropagation()} />
          <div className="lightbox-caption">{lightbox.label}</div>
        </div>
      )}
    </>
  );
}

const extraAlign = {

function Devlog() {
  const [openPost, setOpenPost] = React.useState(null);
  const [lightbox, setLightbox] = React.useState(null);

  React.useEffect(() => {
    const handler = (e) => {
      if (e.key === 'Escape') {
        if (lightbox) setLightbox(null);
        else if (openPost) setOpenPost(null);
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [openPost, lightbox]);

  return (
    <>
      <div className="devlog-grid">
        {devlogEntries.map((entry, i) => {
          const align = extraAlign[entry.title];
          const useSideBySide = !!align && entry.extraMedia;
          return (
            <div className="devlog-card" key={i} onClick={() => setOpenPost(entry)}>
              {useSideBySide ? (
                <div className={`devlog-media-row ${align}`}>
                  <div><img src={entry.media} alt={entry.title} loading="lazy" /></div>
                  {entry.extraMedia.map((m, j) => (
                    <div key={j}><img src={m.src} alt={m.label} loading="lazy" /></div>
                  ))}
                </div>
              ) : (
                <>
                  {entry.mediaType === 'gif' || entry.mediaType === 'img'
                    ? <img className="devlog-media" src={entry.media} alt={entry.title} loading="lazy" />
                    : <div className="devlog-media-placeholder">Image coming soon</div>
                  }
                  {entry.extraMedia && (
                    <div className="devlog-media-row">
                      {entry.extraMedia.map((m, j) => (
                        <div key={j}><img src={m.src} alt={m.label} loading="lazy" /></div>
                      ))}
                    </div>
                  )}
                </>
              )}
              <div className="devlog-body">
                <div className="devlog-meta">
                  <span className="devlog-tag">{entry.tag}</span>
                  <span className="devlog-date">{entry.date}</span>
                </div>
                <div className="devlog-title">{entry.title}</div>
                <p className="devlog-desc">{entry.desc}</p>
              </div>
            </div>
          );
        })}
      </div>

      {openPost && (
        <div className="post-modal-overlay" onClick={() => setOpenPost(null)}>
          <div className="post-modal" onClick={e => e.stopPropagation()}>
            <button className="post-modal-close" onClick={() => setOpenPost(null)}>×</button>
            <div className="post-modal-body">
              <div className="post-modal-meta">
                <span className="devlog-tag">{openPost.tag}</span>
                <span className="devlog-date">{openPost.date}</span>
              </div>
              <div className="post-modal-title">{openPost.title}</div>
              <p className="post-modal-desc">{openPost.desc}</p>
              {openPost.itchUrl && (
                <a href={openPost.itchUrl} target="_blank" rel="noopener" style={{ display: 'inline-block', marginBottom: '24px', fontSize: '13px', fontWeight: 600, color: 'var(--blue-dk)', textDecoration: 'none', borderBottom: '1px solid var(--blue-lt)', paddingBottom: '2px' }}>
                  Read full devlog on itch.io →
                </a>
              )}
              <div className="post-modal-gallery">
                {[{ src: openPost.media, label: openPost.title }, ...(openPost.extraMedia || [])].map((m, j) => (
                  <div key={j} className="pmg-item" onClick={() => setLightbox(m)}>
                    <img src={m.src} alt={m.label} loading="lazy" />
                    {m.label && j > 0 && <div className="pmg-caption">{m.label}</div>}
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}

      {lightbox && (
        <div className="lightbox-overlay" onClick={() => setLightbox(null)} style={{ zIndex: 1000 }}>
          <button className="lightbox-close" onClick={() => setLightbox(null)}>×</button>
          <img src={lightbox.src} alt={lightbox.label} onClick={e => e.stopPropagation()} />
          {lightbox.label && <div className="lightbox-caption">{lightbox.label}</div>}
        </div>
      )}
    </>
  );
}
